server {
    listen      8080;
    server_name localhost;
    root        www;
    index       index.html;

    # Body cap kept small so the dashboard can trip a 413 on purpose.
    client_max_body_size 1000000;

    error_page 400 error_pages/400.html;
    error_page 403 error_pages/403.html;
    error_page 404 error_pages/404.html;
    error_page 405 error_pages/405.html;
    error_page 413 error_pages/413.html;
    error_page 500 error_pages/500.html;
    error_page 501 error_pages/501.html;

    # Dashboard + static assets. GET/POST/DELETE allowed at the root.
    location / {
        allow_methods GET POST DELETE;
        index         index.html;
        autoindex     off;
    }

    # CGI: any *.py runs through python3.
    location /cgi-bin {
        allow_methods GET POST DELETE;
        root          www/cgi-bin;
        index         echo.py;
        cgi_ext       .py .sh;
        cgi_path      /usr/bin/python3 /bin/bash;
    }

    # Uploads: POST stores files here, GET lists/serves them, DELETE removes.
    location /uploads {
        allow_methods GET POST DELETE;
        root          www/uploads;
        upload_store  www/uploads;
        autoindex     on;
    }

    # Directory listing demo (browse the whole site tree).
    location /files {
        allow_methods GET;
        root          www;
        autoindex     on;
    }

    # Forbidden: a directory with no index and autoindex off -> 403.
    location /private {
        allow_methods GET;
        root          www/private;
        autoindex     off;
    }

    # Redirect demo: /old -> /
    location /old {
        allow_methods GET;
        return        /;
    }
}

# A second server on another port (proves multiple ports work).
server {
    listen      8081;
    server_name localhost;
    root        www;
    index       index.html;
    client_max_body_size 1000000;
    location / 
    { 
        allow_methods GET; 
        autoindex off; 
        index index.html;
    }
}