server {
    listen      8080;
    server_name nexus;
    host        127.0.0.1;

    # Root of the website — point this to wherever you placed the site folder
    root        website/;

    # Default index file
    index       index.html;

    # Upload size limit (3 MB)
    client_max_body_size 3000000;

    # Custom error pages
    error_page 400 error_pages/400.html;
    error_page 404 error_pages/404.html;

    # ── Root location: serves index.html and all static assets ──
    location / {
        allow_methods   GET POST DELETE;
        autoindex       off;
        index           index.html;
    }

    # ── /pages: the inner HTML pages (about, services, contact, login) ──
    location /pages {
        allow_methods   GET;
        root            website/pages/;
        autoindex       off;
    }

    # ── /error_pages: only served internally via error_page directives ──
    location /error_pages {
        allow_methods   GET;
        root            website/error_pages/;
        autoindex       off;
    }

    # ── /cgi-bin: CGI scripts (Python echo, file manager, etc.) ──
    location /cgi-bin {
        allow_methods   GET POST DELETE;
        root            website/cgi-bin/;
        index           echo.py;
        cgi_ext         .py;
        cgi_path        /usr/bin/python3;
    }

    # ── /assets: images, fonts, or other static assets ──
    location /assets {
        allow_methods   GET;
        autoindex       off;
    }

    # ── Convenience redirect: /home → / ──
    location /home {
        return /;
    }

    # ── Convenience redirect: /login → /pages/login.html ──
    location /login {
        return /pages/login.html;
    }

    # ── Convenience redirect: /about → /pages/about.html ──
    location /about {
        return /pages/about.html;
    }

    # ── Convenience redirect: /services → /pages/services.html ──
    location /services {
        return /pages/services.html;
    }

    # ── Convenience redirect: /contact → /pages/contact.html ──
    location /contact {
        return /pages/contact.html;
    }

    location /dashboard {
        return /pages/dashboard.html;
    }
}