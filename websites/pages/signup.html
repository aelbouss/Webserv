<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Cookie & Session Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 48px 40px; width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 1.8rem; color: #7c6af7; letter-spacing: 1px; }
        .logo p { font-size: 0.8rem; color: #666; margin-top: 4px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="password"], input[type="email"] { width: 100%; padding: 12px 16px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; font-size: 0.95rem; margin-bottom: 20px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #7c6af7; }
        button { width: 100%; padding: 14px; background: #7c6af7; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #6a58e0; }
        .info-box { background: #0d0d1f; border: 1px solid #2a2a4a; border-radius: 8px; padding: 14px 16px; font-size: 0.8rem; color: #888; line-height: 1.6; margin-top: 24px; }
        .info-box strong { color: #7c6af7; }
        .link-row { text-align: center; margin-top: 20px; font-size: 0.82rem; color: #555; }
        .link-row a { color: #7c6af7; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>📝 Create Account</h1>
        <p>Sign up for session and cookie testing</p>
    </div>

    <form action="/cgi-bin/register.py" method="POST" enctype="application/x-www-form-urlencoded" accept-charset="UTF-8">
        <label for="display">Full Name</label>
        <input type="text" id="display" name="display" placeholder="Jane Doe" required>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit">Create Account</button>
    </form>

    <div class="info-box">
        Use any username you like. After creating an account, sign in from the login page.
    </div>

    <div class="link-row">
        <a href="/login">← Back to login</a>
    </div>
</div>
</body>
</html>
