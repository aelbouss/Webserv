<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 — Forbidden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #04080f; --accent: #ff6b6b; --text: #e8f0fe; --muted: #7a90ab; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    body::before { content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,107,107,0.07) 0%, transparent 70%); pointer-events: none; }
    .num { font-family: 'Syne', sans-serif; font-size: clamp(7rem, 20vw, 14rem); font-weight: 800; letter-spacing: -0.06em; color: rgba(255,107,107,0.2); line-height: 1; margin-bottom: 16px; }
    h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; letter-spacing: -0.04em; margin-bottom: 14px; }
    p { color: var(--muted); max-width: 38ch; line-height: 1.7; margin-bottom: 36px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 28px; border-radius: 999px; background: var(--accent); color: #fff; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: transform .18s; box-shadow: 0 4px 20px rgba(255,107,107,0.3); }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="num">403</div>
  <h1>Forbidden</h1>
  <p>You don't have permission to access this resource on the server.</p>
  <a href="/" class="btn">← Back to Home</a>
</body>
</html>
